name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT }}/php-app:latest -f Dockerfile .

      - name: Push Docker image
        run: |
          gcloud auth configure-docker
          docker push gcr.io/${{ secrets.GCP_PROJECT }}/php-app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy php-cloudrun \
          --image gcr.io/${{ secrets.GCP_PROJECT }}/php-app:latest \
          --region europe-west1 \
          --platform managed \
          --allow-unauthenticated